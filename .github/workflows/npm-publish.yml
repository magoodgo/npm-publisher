name: Publish to npm

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: '要发布的 release tag，如 v1.0.3'
        required: true
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read        # 下载 release 资产只需 read（原来的 write 也行）
      id-token: write       # ★ OIDC 必须（你已有）
    steps:
      - name: Download .tgz from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p pkg
          cd pkg
          gh release download "${{ github.event.release.tag_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "*.tgz"
          echo "📦 Downloaded files:"
          ls -la

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm (Trusted Publishing 需要 npm >= 11.5.1)
        run: npm install -g npm@latest

      - name: Publish to npm (OIDC, 无需 token)
        run: |
          cd pkg
          npm publish *.tgz --access public
